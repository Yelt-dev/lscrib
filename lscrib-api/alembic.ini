# Config de Alembic para uso en dev (CLI): `uv run alembic revision --autogenerate -m "..."`.
# En runtime la app NO lee este archivo: construye la Config en código
# (lscrib.db.migrate) para localizar las migraciones dentro del paquete y usar
# la misma URL de SQLite que settings. La `sqlalchemy.url` de aquí la sobrescribe
# env.py con settings.db_url, así que este valor solo evita que Alembic proteste.

[alembic]
script_location = src/lscrib/db/migrations
prepend_sys_path = src
sqlalchemy.url = sqlite:///lscrib.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
